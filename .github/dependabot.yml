version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5

  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:10"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5

  - package-ecosystem: "uv"
    directory: "/sample_app"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:20"
      timezone: "UTC"
    labels:
      - "dependencies"
      - "python"
      - "sample-app"
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5
