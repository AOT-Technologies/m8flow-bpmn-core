name: DCO

on:
  pull_request:
  merge_group:
    types: [checks_requested]

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve commits to inspect
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git rev-list --reverse \
              "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
              > commits.txt
          else
            merge_sha="$(git rev-parse HEAD)"
            first_parent="$(git rev-parse HEAD^1)"
            git rev-list --reverse "${first_parent}..${merge_sha}" \
              | grep -vx "${merge_sha}" \
              > commits.txt || true
          fi

          if [[ -s commits.txt ]]; then
            echo "Commits queued for DCO validation:"
            cat commits.txt
          else
            echo "No commits found to validate."
          fi

      - name: Validate Signed-off-by trailers
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import re
          import subprocess
          import sys

          signoff_re = re.compile(
              r"^Signed-off-by:\s*(?P<name>.+?)\s*<(?P<email>[^<>\s]+@[^<>\s]+)>\s*$",
              re.IGNORECASE,
          )

          def normalized(name: str, email: str) -> tuple[str, str]:
              return (" ".join(name.split()).casefold(), email.strip().casefold())

          def git(*args: str) -> str:
              completed = subprocess.run(
                  ["git", *args],
                  capture_output=True,
                  text=True,
                  check=False,
              )
              if completed.returncode != 0:
                  raise SystemExit(completed.stderr.strip() or completed.stdout.strip())
              return completed.stdout

          commits_path = pathlib.Path("commits.txt")
          commits = [line.strip() for line in commits_path.read_text().splitlines() if line.strip()]
          if not commits:
              print("No commits to validate.")
              raise SystemExit(0)

          failures: list[str] = []
          for sha in commits:
              raw = git("show", "-s", "--format=%an%x00%ae%x00%cn%x00%ce%x00%B", sha)
              author_name, author_email, committer_name, committer_email, message = raw.split("\x00", 4)
              expected = {
                  normalized(author_name, author_email),
                  normalized(committer_name, committer_email),
              }

              signoffs = set()
              for line in message.splitlines():
                  match = signoff_re.match(line.strip())
                  if match is None:
                      continue
                  signoffs.add(normalized(match.group("name"), match.group("email")))

              if not signoffs:
                  failures.append(
                      f"commit {sha[:12]} is missing a Signed-off-by trailer. "
                      "Use `git commit -s`, `git commit --amend -s`, or "
                      "`git rebase --signoff <base>`."
                  )
                  continue

              if expected.isdisjoint(signoffs):
                  failures.append(
                      f"commit {sha[:12]} has Signed-off-by trailer(s), but none match "
                      "the author or committer identity."
                  )

          if failures:
              for failure in failures:
                  print(f"::error::{failure}")
              raise SystemExit(1)

          print(f"Validated DCO trailers for {len(commits)} commit(s).")
          PY
