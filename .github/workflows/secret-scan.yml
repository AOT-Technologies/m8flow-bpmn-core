name: Secret Scan

on:
  push:
  pull_request:
  merge_group:
  schedule:
    - cron: "41 5 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    env:
      GITLEAKS_VERSION: "8.30.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install Gitleaks
        run: |
          curl -sSL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz gitleaks
          install -m 0755 gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Run Gitleaks
        id: gitleaks
        continue-on-error: true
        run: |
          gitleaks dir \
            --config .gitleaks.toml \
            --report-format sarif \
            --report-path gitleaks.sarif \
            --redact \
            .

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

      - name: Upload Gitleaks report artifact
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif

      - name: No secrets detected
        if: steps.gitleaks.outcome == 'success'
        run: echo "Gitleaks found no potential secrets."

      - name: Mark job failed because Gitleaks found secrets
        if: steps.gitleaks.outcome == 'failure'
        run: |
          echo "Gitleaks detected one or more potential secrets."
          exit 1
